<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KSN Pro Inventory</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        :root { --accent: #2563eb; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Courier New', Courier, monospace; background: #f1f5f9; }

        /* Setup UI */
        .no-print { 
            background: white; padding: 20px; border-bottom: 2px solid #333; 
            font-family: sans-serif; position: sticky; top: 0; z-index: 100; 
        }
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; max-width: 1000px; margin: 0 auto; }
        input, button { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; }
        .btn-add { background: #333; color: white; cursor: pointer; border: none; font-weight: bold; }
        .btn-print { background: #059669; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* Slab Label Styling */
        #print-area { 
            display: grid; 
            grid-template-columns: repeat(4, 1in); 
            width: 4in; 
            margin: 20px auto; 
            background: white;
        }

        .slab-label {
            width: 1in; height: 1.2in; border: 0.1px solid #eee;
            padding: 0.1in; display: flex; flex-direction: column;
            color: #000; position: relative; background: #fff;
        }

        .row-header { display: flex; justify-content: space-between; font-size: 6pt; font-weight: bold; margin-bottom: 4px; }
        .coin-title { font-size: 9.5pt; font-weight: 900; line-height: 1.1; margin: 4px 0; text-align: center; }
        .sub-info { display: flex; justify-content: space-around; font-size: 7pt; margin-top: 4px; font-weight: bold; }
        
        .barcode-container { margin-top: auto; text-align: center; }
        .barcode-svg { width: 100%; height: 28px !important; }
        .sku-number { font-size: 8pt; font-weight: bold; text-align: center; margin-top: -2px; }

        @media print {
            .no-print { display: none !important; }
            #print-area { margin: 0; width: 4in; }
            .slab-label { border: 0.1px solid #ddd; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <div class="controls">
        <div style="grid-column: span 2;">
            <label style="display:block; font-size:10px; font-weight:bold;">COIN DESCRIPTION</label>
            <input type="text" id="desc" placeholder="1911-S 10C PCGS MS 65 CAC" style="width:100%;">
        </div>
        <div>
            <label style="display:block; font-size:10px; font-weight:bold;">ASK PRICE</label>
            <input type="text" id="ask" placeholder="$0.00" style="width:100%;">
        </div>
        <div>
            <label style="display:block; font-size:10px; font-weight:bold;">QTY</label>
            <input type="number" id="qty" value="1" style="width:100%;">
        </div>
        <div style="display:flex; align-items:flex-end;">
            <button class="btn-add" id="addBtn" onclick="handleGenerate()">SYNC & ADD</button>
        </div>
    </div>
</div>

<div id="print-area"></div>

<div class="no-print" style="position:fixed; bottom:20px; right:20px;">
    <button class="btn-print" onclick="window.print()" style="padding: 15px 30px; border-radius: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">PRINT 4x6 SHEET</button>
</div>

<script>
    // --- SUPABASE CONFIG ---
    const SB_URL = "YOUR_SUPABASE_URL"; 
    const SB_KEY = "YOUR_SUPABASE_ANON_KEY";
    const supabase = exports.supabase.createClient(SB_URL, SB_KEY);

    async function getNextSku() {
        const { data, error } = await supabase
            .from('inventory')
            .select('sku')
            .order('sku', { ascending: false })
            .limit(1);
        return data.length > 0 ? data[0].sku + 1 : 1000000; // Professional 7-digit SKUs
    }

    async function handleGenerate() {
        const qty = parseInt(document.getElementById('qty').value) || 1;
        const desc = document.getElementById('desc').value;
        const ask = document.getElementById('ask').value;

        let currentSku = await getNextSku();

        for (let i = 0; i < qty; i++) {
            const skuNum = currentSku + i;
            
            // Log to Cloud Backend
            await supabase.from('inventory').insert([{ sku: skuNum, description: desc, ask: ask }]);

            // Create Visual Label
            renderSlab(skuNum, desc, ask);
        }
    }

    function renderSlab(sku, desc, ask) {
        const container = document.getElementById('print-area');
        const div = document.createElement('div');
        div.className = 'slab-label';
        
        // Formatted like the Witter Coin sample
        div.innerHTML = `
            <div class="row-header">
                <span>KSNumismatics</span>
                <span>${ask || '$0.00'}</span>
            </div>
            <div class="coin-title">${desc}</div>
            <div class="sub-info">
                <span>PRIVATE</span>
                <span>C01</span>
            </div>
            <div class="barcode-container">
                <svg id="svg-${sku}" class="barcode-svg"></svg>
                <div class="sku-number">${sku}</div>
            </div>
        `;
        container.appendChild(div);

        JsBarcode(`#svg-${sku}`, sku.toString(), {
            format: "CODE128",
            width: 2,
            height: 30,
            displayValue: false,
            margin: 0
        });
    }
</script>
</body>
</html>
