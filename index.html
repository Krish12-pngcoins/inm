<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>American Breaks | Premium Mystery Coin Bags</title>
  <meta name="description" content="American Breaks offers premium mystery coin bags featuring certified Lincoln cents, key dates, and more. Chase rare coins with every bag." />
  <meta name="keywords" content="mystery coin bags, certified coins, Lincoln cent, coin breaks, rare coins, PCGS, NGC, American Breaks" />
  <meta name="robots" content="index, follow" />
  <meta property="og:title" content="American Breaks | Premium Mystery Coin Bags" />
  <meta property="og:description" content="Chase rare certified coins with every mystery bag. Limited mintage. Premium quality." />
  <meta property="og:type" content="website" />
  <link rel="canonical" href="[americanbreaks.com](https://americanbreaks.com)" />
  <script type="application/ld+json">
  {
    "@context": "[schema.org](https://schema.org)",
    "@type": "Store",
    "name": "American Breaks",
    "description": "Premium mystery coin bags featuring certified Lincoln cents and rare coins.",
    "url": "americanbreaks.com",
    "email": "americanbreaksshop@gmail.com"
  }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #C9A84C;
      --gold-light: #E2C97E;
      --gold-dark: #8B6914;
      --black: #0A0A0A;
      --dark: #111111;
      --dark2: #1A1A1A;
      --dark3: #222222;
      --white: #FFFFFF;
      --gray: #999999;
      --gray-light: #CCCCCC;
      --font-head: 'Georgia', 'Times New Roman', serif;
      --font-body: 'Segoe UI', Arial, sans-serif;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--black);
      color: var(--white);
      font-family: var(--font-body);
      line-height: 1.6;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; cursor: pointer; }
    img { max-width: 100%; display: block; }
    button { cursor: pointer; border: none; outline: none; background: none; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 3px; }

    /* ── ANNOUNCE BAR ── */
    .announce-bar {
      background: linear-gradient(90deg, var(--gold-dark), var(--gold), var(--gold-dark));
      text-align: center;
      padding: 9px 20px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--black);
      position: fixed; top: 0; left: 0; right: 0; z-index: 1001;
    }

    /* ── NAVBAR ── */
    .navbar {
      position: fixed; top: 38px; left: 0; right: 0; z-index: 1000;
      background: rgba(10,10,10,0.97);
      border-bottom: 1px solid rgba(201,168,76,0.25);
      backdrop-filter: blur(10px);
      padding: 0 40px;
      height: 70px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo {
      font-family: var(--font-head);
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      cursor: pointer;
    }
    .nav-logo span { color: var(--white); }
    .nav-links {
      display: flex; align-items: center; gap: 32px;
      list-style: none;
    }
    .nav-links li a, .nav-links li button {
      font-size: 0.78rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gray-light);
      transition: color 0.25s;
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font-body);
    }
    .nav-links li a:hover, .nav-links li button:hover { color: var(--gold); }
    .nav-cta {
      background: var(--gold) !important;
      color: var(--black) !important;
      padding: 9px 22px !important;
      border-radius: 3px;
      font-weight: 700 !important;
      transition: background 0.25s, transform 0.2s !important;
    }
    .nav-cta:hover { background: var(--gold-light) !important; transform: translateY(-1px); }
    .hamburger {
      display: none; flex-direction: column; gap: 5px;
      background: none; padding: 4px; cursor: pointer;
    }
    .hamburger span {
      display: block; width: 24px; height: 2px;
      background: var(--gold); border-radius: 2px;
    }

    /* ── PAGES ── */
    .page { display: none; }
    .page.active { display: block; }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
      padding: 140px 20px 80px;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 40%, rgba(201,168,76,0.1) 0%, transparent 65%),
                  linear-gradient(180deg, #0A0A0A 0%, #0D0D0D 100%);
    }
    .hero-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    .hero-content { position: relative; z-index: 2; max-width: 800px; margin: 0 auto; }
    .hero-badge {
      display: inline-block;
      border: 1px solid rgba(201,168,76,0.4);
      color: var(--gold);
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 7px 18px;
      border-radius: 20px;
      margin-bottom: 28px;
      background: rgba(201,168,76,0.06);
    }
    .hero h1 {
      font-family: var(--font-head);
      font-size: clamp(2.8rem, 7vw, 5.5rem);
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 24px;
    }
    .hero h1 em {
      font-style: normal;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p {
      font-size: 1.1rem;
      color: var(--gray);
      max-width: 540px;
      margin: 0 auto 40px;
      line-height: 1.7;
    }
    .hero-btns { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .btn-primary {
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: var(--black);
      padding: 15px 36px;
      border-radius: 4px;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: transform 0.2s, box-shadow 0.2s;
      display: inline-block;
      cursor: pointer;
      border: none;
      font-family: var(--font-body);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(201,168,76,0.35);
    }
    .btn-secondary {
      border: 1px solid rgba(201,168,76,0.4);
      color: var(--gold-light);
      padding: 15px 36px;
      border-radius: 4px;
      font-size: 0.85rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: border-color 0.2s, background 0.2s;
      display: inline-block;
      cursor: pointer;
      background: none;
      font-family: var(--font-body);
    }
    .btn-secondary:hover {
      border-color: var(--gold);
      background: rgba(201,168,76,0.07);
    }

    /* ── SECTIONS ── */
    section { padding: 90px 40px; }
    .container { max-width: 1200px; margin: 0 auto; }
    .section-label {
      font-size: 0.7rem; letter-spacing: 3px;
      text-transform: uppercase; color: var(--gold); margin-bottom: 12px;
    }
    .section-title {
      font-family: var(--font-head);
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 700; line-height: 1.2; margin-bottom: 16px;
    }
    .section-sub { color: var(--gray); font-size: 1rem; max-width: 520px; line-height: 1.7; }
    .divider { width: 60px; height: 2px; background: linear-gradient(90deg, var(--gold), transparent); margin: 20px 0; }

    /* ── HOW IT WORKS ── */
    .how-section { background: var(--dark); }
    .how-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 28px; margin-top: 56px;
    }
    .how-card {
      background: var(--dark2);
      border: 1px solid rgba(201,168,76,0.12);
      border-radius: 8px; padding: 32px 24px; text-align: center;
      transition: border-color 0.3s, transform 0.3s;
    }
    .how-card:hover { border-color: rgba(201,168,76,0.4); transform: translateY(-4px); }
    .how-icon {
      width: 58px; height: 58px;
      background: rgba(201,168,76,0.08);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 18px; font-size: 1.4rem;
    }
    .how-step { font-size: 0.65rem; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; margin-bottom: 8px; }
    .how-card h3 { font-family: var(--font-head); font-size: 1.05rem; margin-bottom: 10px; }
    .how-card p { font-size: 0.86rem; color: var(--gray); line-height: 1.65; }

    /* ── SHOP ── */
    .shop-section { background: var(--black); }
    .shop-filters { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
    .filter-btn {
      background: var(--dark2);
      border: 1px solid rgba(201,168,76,0.15);
      color: var(--gray);
      padding: 7px 18px; border-radius: 20px;
      font-size: 0.75rem; letter-spacing: 1.5px;
      text-transform: uppercase; transition: all 0.2s; cursor: pointer;
      font-family: var(--font-body);
    }
    .filter-btn.active, .filter-btn:hover {
      background: rgba(201,168,76,0.12);
      border-color: var(--gold); color: var(--gold);
    }
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 28px; margin-top: 48px;
    }
    .product-card {
      background: var(--dark2);
      border: 1px solid rgba(201,168,76,0.15);
      border-radius: 10px; overflow: hidden;
      transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
      cursor: pointer; position: relative;
    }
    .product-card:hover {
      border-color: rgba(201,168,76,0.5);
      transform: translateY(-6px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px rgba(201,168,76,0.08);
    }
    .product-badge {
      position: absolute; top: 14px; left: 14px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: var(--black); font-size: 0.65rem; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      padding: 4px 10px; border-radius: 3px; z-index: 2;
    }
    .product-badge.coming-soon { background: #333; color: var(--gray); }
    .product-img-wrap {
      height: 300px;
      background: linear-gradient(135deg, #1a1a1a, #111);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }
    .product-img-wrap img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.4s;
    }
    .product-card:hover .product-img-wrap img { transform: scale(1.04); }
    .product-img-placeholder {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 10px;
      color: rgba(201,168,76,0.3); font-size: 3.5rem;
    }
    .product-img-placeholder span {
      font-size: 0.7rem; letter-spacing: 2px;
      text-transform: uppercase; color: rgba(201,168,76,0.2);
    }
    .product-info { padding: 22px; }
    .product-series { font-size: 0.65rem; letter-spacing: 2.5px; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
    .product-name { font-family: var(--font-head); font-size: 1.2rem; font-weight: 700; margin-bottom: 10px; }
    .product-desc { font-size: 0.82rem; color: var(--gray); line-height: 1.6; margin-bottom: 16px; }
    .product-meta { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 16px; }
    .product-meta-item { display: flex; align-items: center; gap: 6px; font-size: 0.73rem; color: var(--gray); }
    .product-meta-item .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }
    .product-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 16px;
    }
    .product-price { font-family: var(--font-head); font-size: 1.3rem; font-weight: 700; color: var(--gold); }
    .product-price span { font-size: 0.68rem; color: var(--gray); letter-spacing: 1px; display: block; font-family: var(--font-body); }
    .product-launch { font-size: 0.68rem; color: var(--gray); letter-spacing: 1px; text-align: right; }
    .product-launch strong { display: block; color: var(--gold-light); font-size: 0.8rem; }
    .btn-shop {
      display: block; width: 100%; text-align: center;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: var(--black); padding: 12px 24px; border-radius: 4px;
      font-size: 0.78rem; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer; border: none; font-family: var(--font-body);
    }
    .btn-shop:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(201,168,76,0.3); }

    /* ── DETAIL PAGE ── */
    .detail-hero {
      min-height: 70vh; padding: 140px 40px 80px;
      background: var(--dark); position: relative; overflow: hidden;
    }
    .detail-hero-bg {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 60% 50%, rgba(201,168,76,0.08) 0%, transparent 60%);
    }
    .detail-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 60px; align-items: start;
      position: relative; z-index: 2;
    }
    .detail-img-main {
      width: 100%; height: 380px;
      background: var(--dark3);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 10px; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 12px;
    }
    .detail-img-main img { width: 100%; height: 100%; object-fit: cover; }
    .detail-img-thumbs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .detail-img-thumb {
      height: 150px; background: var(--dark3);
      border: 1px solid rgba(201,168,76,0.15);
      border-radius: 8px; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .detail-img-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .detail-back {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase;
      color: var(--gold); margin-bottom: 22px; cursor: pointer;
      background: none; border: none; font-family: var(--font-body);
      transition: gap 0.2s;
    }
    .detail-back:hover { gap: 12px; }
    .detail-series { font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
    .detail-title { font-family: var(--font-head); font-size: clamp(2rem, 4vw, 3rem); font-weight: 700; line-height: 1.15; margin-bottom: 18px; }
    .detail-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 22px; }
    .detail-tag {
      border: 1px solid rgba(201,168,76,0.25); color: var(--gold-light);
      font-size: 0.68rem; letter-spacing: 1.5px; text-transform: uppercase;
      padding: 5px 12px; border-radius: 3px; background: rgba(201,168,76,0.05);
    }
    .detail-desc { color: var(--gray-light); font-size: 0.93rem; line-height: 1.75; margin-bottom: 26px; }
    .detail-facts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 28px; }
    .detail-fact {
      background: rgba(201,168,76,0.05);
      border: 1px solid rgba(201,168,76,0.12);
      border-radius: 6px; padding: 14px 16px;
    }
    .detail-fact-label { font-size: 0.63rem; letter-spacing: 2px; text-transform: uppercase; color: var(--gray); margin-bottom: 4px; }
    .detail-fact-val { font-family: var(--font-head); font-size: 1rem; color: var(--gold-light); }
    .detail-price-row { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; margin-bottom: 26px; }
    .detail-price { font-family: var(--font-head); font-size: 2rem; color: var(--gold); font-weight: 700; }
    .detail-mintage-badge {
      background: rgba(201,168,76,0.08);
      border: 1px solid rgba(201,168,76,0.25);
      color: var(--gold); font-size: 0.7rem;
      letter-spacing: 2px; text-transform: uppercase;
      padding: 6px 14px; border-radius: 20px;
    }
    .detail-btns { display: flex; gap: 14px; flex-wrap: wrap; }
    .btn-view-coins {
      border: 2px solid var(--gold); color: var(--gold);
      padding: 13px 28px; border-radius: 4px;
      font-size: 0.8rem; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; transition: background 0.2s, color 0.2s;
      cursor: pointer; background: none; font-family: var(--font-body);
    }
    .btn-view-coins:hover { background: rgba(201,168,76,0.12); }

    /* ── INSIDE SECTION ── */
    .inside-section { background: var(--black); }
    .inside-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px; margin-top: 44px;
    }
    .inside-card {
      background: var(--dark2); border: 1px solid rgba(201,168,76,0.1);
      border-radius: 8px; padding: 26px; transition: border-color 0.3s;
    }
    .inside-card:hover { border-color: rgba(201,168,76,0.3); }
    .inside-card-icon { font-size: 1.7rem; margin-bottom: 12px; }
    .inside-card h3 { font-family: var(--font-head); font-size: 0.98rem; margin-bottom: 8px; }
    .inside-card p { font-size: 0.82rem; color: var(--gray); line-height: 1.6; }

    /* ── TRUST ── */
    .trust-section { background: var(--dark); }
    .trust-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px; margin-top: 44px;
    }
    .trust-card {
      text-align: center; padding: 30px 20px;
      background: var(--dark2); border: 1px solid rgba(201,168,76,0.08);
      border-radius: 8px; transition: border-color 0.3s;
    }
    .trust-card:hover { border-color: rgba(201,168,76,0.25); }
    .trust-logo { font-family: var(--font-head); font-size: 1.3rem; font-weight: 700; color: var(--gold); letter-spacing: 2px; margin-bottom: 8px; }
    .trust-desc { font-size: 0.78rem; color: var(--gray); line-height: 1.5; }

    /* ── FAQ ── */
    .faq-section { background: var(--black); }
    .faq-list { margin-top: 44px; max-width: 740px; }
    .faq-item { border-bottom: 1px solid rgba(201,168,76,0.1); }
    .faq-q {
      width: 100%; background: none; border: none;
      text-align: left; padding: 20px 0;
      font-size: 0.95rem; color: var(--white);
      display: flex; justify-content: space-between; align-items: center;
      gap: 16px; cursor: pointer; transition: color 0.2s;
      font-family: var(--font-body);
    }
    .faq-q:hover { color: var(--gold-light); }
    .faq-icon {
      width: 26px; height: 26px; flex-shrink: 0;
      border: 1px solid rgba(201,168,76,0.35);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; color: var(--gold);
      transition: transform 0.3s, background 0.2s;
    }
    .faq-item.open .faq-icon { transform: rotate(45deg); background: rgba(201,168,76,0.1); }
    .faq-a {
      max-height: 0; overflow: hidden;
      font-size: 0.88rem; color: var(--gray); line-height: 1.75;
      transition: max-height 0.4s ease, padding 0.3s;
      padding: 0;
    }
    .faq-item.open .faq-a { max-height: 400px; padding-bottom: 20px; }

    /* ── COIN LIST PAGE ── */
    .coinlist-hero {
      padding: 140px 40px 60px; background: var(--dark);
      text-align: center; position: relative; overflow: hidden;
    }
    .coinlist-hero-bg {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(201,168,76,0.07) 0%, transparent 60%);
    }
    .coinlist-hero .container { position: relative; z-index: 2; }
    .coinlist-section { background: var(--black); padding: 60px 40px 100px; }
    .coinlist-controls { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 28px; align-items: center; }
    .coinlist-search {
      flex: 1; min-width: 220px;
      background: var(--dark2); border: 1px solid rgba(201,168,76,0.2);
      border-radius: 6px; padding: 10px 16px; color: var(--white);
      font-size: 0.9rem; outline: none; transition: border-color 0.2s;
      font-family: var(--font-body);
    }
    .coinlist-search::placeholder { color: var(--gray); }
    .coinlist-search:focus { border-color: var(--gold); }
    .coinlist-count { font-size: 0.8rem; color: var(--gray); }
    .coinlist-count strong { color: var(--gold); }
    .coin-table-wrap {
      background: var(--dark2); border: 1px solid rgba(201,168,76,0.1);
      border-radius: 10px; overflow: hidden;
    }
    .coin-table { width: 100%; border-collapse: collapse; font-size: 0.86rem; }
    .coin-table thead { background: rgba(201,168,76,0.08); border-bottom: 1px solid rgba(201,168,76,0.15); }
    .coin-table th { padding: 14px 18px; text-align: left; font-size: 0.67rem; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); font-weight: 600; }
    .coin-table td { padding: 12px 18px; border-bottom: 1px solid rgba(255,255,255,0.04); color: var(--gray-light); }
    .coin-table tr:last-child td { border-bottom: none; }
    .coin-table tr:hover td { background: rgba(201,168,76,0.03); }
    .coin-num { color: var(--gray); font-size: 0.73rem; }
